<!DOCTYPE html>
<html>

<head>

<title>r.cBot Dashboard</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

.card{
display:inline-block;
background:#1e1e1e;
padding:20px;
margin:20px;
border-radius:10px;
width:200px;
}

.value{
font-size:30px;
color:#00ffcc;
}

</style>

</head>

<body>

<h1>🤖 r.cBot Dashboard</h1>

<div class="card">
<h3>🌍 Translations</h3>
<div class="value">{{ translations }}</div>
</div>

<div class="card">
<h3>🖥 Servers</h3>
<div class="value">{{ servers }}</div>
</div>

<div class="card">
<h3>👥 Users</h3>
<div class="value">{{ users }}</div>
</div>

</body>

</html>
